name: Repository Hygiene

on:
  pull_request:
  push:
    branches: [master]

jobs:
  hygiene:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Run repository hygiene checks
        run: |
          python tools/repo_hygiene_check.py
